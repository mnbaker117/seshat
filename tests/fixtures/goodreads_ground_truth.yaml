# Goodreads "ground truth" fixture for the v2.11.0 metadata-source
# overhaul acceptance criteria.
#
# Mark hand-collects this dataset from his browser (where Cloudflare
# doesn't gate him) and we use it to verify that v2.11.0's automated
# pipeline reaches at-least-equivalent coverage without any code path
# touching the robots-disallowed /search endpoint.
#
# Source for IDs already filled in: Seshat's per-library authors
# table (seshat_calibre-library.db). 3 authors with `goodreads_author_id: ~`
# need fresh lookup from your browser — visit their Goodreads
# search page and grab the canonical /author/show/{id}.
#
# ── Per-author fields ─────────────────────────────────────────
# canonical_name              — exact spelling as Goodreads displays it
# goodreads_author_id         — int from /author/show/{id}.{slug}
# author_url                  — full URL; redundant with the id but
#                               handy for the slug (gives us the name
#                               in Goodreads' canonical underscore form)
# total_books_on_goodreads    — approximate; from the author page banner.
#                               "146 books" → 146. Don't sweat the
#                               counts of editions / translations.
# notes                       — optional. Pen names, weird pseudonyms,
#                               "this author's page is weird because…"
#                               anything that would surprise a future
#                               investigator.
#
# ── sample_books (3-5 per author) ─────────────────────────────
# Pick a representative mix per author, ideally including:
#   - one most-popular / best-rated
#   - one mid-series entry (validates series_position extraction)
#   - one recent release (validates latest-N pagination)
#   - one standalone if any (validates non-series handling)
#   - one older / less-popular (validates depth)
# Fewer is fine — even 3 per author is enough for the acceptance
# checks. The harness will assert that v2.11.0's pipeline surfaces
# at least each of these book_ids from the author's bibliography.
#
# Per-book fields:
#   goodreads_book_id  — int from /book/show/{id}.{slug}
#   title              — exact title as Goodreads displays
#   series_name        — null if standalone (use `~` in YAML)
#   series_position    — string ("1", "1.5", "2.75"); null if N/A
#   pub_year           — int; from "First published" line


