<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d2e"/>
      <stop offset="100%" style="stop-color:#0e1019"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6fa8ff"/>
      <stop offset="100%" style="stop-color:#4f7fcc"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#d4a040"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="url(#accent)" stroke-width="8"/>

  <!-- Book body (open book, two pages) -->
  <!-- Left page -->
  <path d="M130 180 L248 200 L248 370 L130 350 Z" fill="#2a3048" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Right page -->
  <path d="M382 180 L264 200 L264 370 L382 350 Z" fill="#2a3048" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Book spine -->
  <line x1="256" y1="195" x2="256" y2="375" stroke="url(#accent)" stroke-width="4"/>

  <!-- Page lines (left) -->
  <line x1="155" y1="225" x2="238" y2="237" stroke="#4a5070" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="250" x2="238" y2="262" stroke="#4a5070" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="275" x2="238" y2="287" stroke="#4a5070" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="300" x2="218" y2="310" stroke="#4a5070" stroke-width="2" stroke-linecap="round"/>

  <!-- Page lines (right) -->
  <line x1="357" y1="225" x2="274" y2="237" stroke="#4a5070" stroke-width="2" stroke-linecap="round"/>
  <line x1="357" y1="250" x2="274" y2="262" stroke="#4a5070" stroke-width="2" stroke-linecap="round"/>
  <line x1="357" y1="275" x2="274" y2="287" stroke="#4a5070" stroke-width="2" stroke-linecap="round"/>
  <line x1="357" y1="300" x2="294" y2="310" stroke="#4a5070" stroke-width="2" stroke-linecap="round"/>

  <!-- Left wing -->
  <path d="M120 230 Q60 190 70 140 Q80 160 100 170 Q75 145 85 110 Q95 140 115 155 Q100 125 110 95 Q120 135 135 160 L130 190 Z"
        fill="url(#gold)" opacity="0.85"/>

  <!-- Right wing -->
  <path d="M392 230 Q452 190 442 140 Q432 160 412 170 Q437 145 427 110 Q417 140 397 155 Q412 125 402 95 Q392 135 377 160 L382 190 Z"
        fill="url(#gold)" opacity="0.85"/>

  <!-- Mouse ears (subtle, at the top) -->
  <ellipse cx="220" cy="130" rx="28" ry="32" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.6"/>
  <ellipse cx="292" cy="130" rx="28" ry="32" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.6"/>

  <!-- Small "H" monogram on the book -->
  <text x="256" y="345" text-anchor="middle" font-family="serif" font-size="36" font-weight="700" fill="url(#accent)" opacity="0.5">H</text>
</svg>
