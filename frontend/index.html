<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />

    <!-- Theme color for the browser address bar / Android status bar.
         Matches the dashboard background so the status bar fades into
         the app chrome instead of the gold accent flashing across the
         top in standalone mode. -->
    <meta name="theme-color" content="#1a1c30" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f0e8" media="(prefers-color-scheme: light)" />

    <!-- iOS PWA: standalone mode (full-screen, no Safari chrome). The
         translucent status bar lets app background show through;
         safe-area-inset CSS env vars protect content from the notch. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Seshat" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Android Chrome equivalent of the iOS standalone hint. -->
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Seshat</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
